# ── Reconciliation thresholds ──────────────────────────────────────────
# These control how FMP vs Finnhub data is classified as green/amber/red.
reconciliation:
  price:
    amber_pct: 0.5       # >0.5% drift = amber flag
    red_pct: 2.0          # >2.0% drift = red flag (blocks publication)
  analyst_targets:
    amber_pct: 5.0
    red_pct: 15.0
  eps_estimates:
    amber_pct: 5.0
    red_pct: 20.0
  revenue_estimates:
    amber_pct: 5.0
    red_pct: 20.0
  stale_data_hours: 24    # data older than this triggers amber

# ── Data quality thresholds ────────────────────────────────────────────
data_quality:
  require_lineage_for_all_final_fields: true
  allow_duplicate_rows: false
  allow_currency_mismatch: false
  max_missing_ratio_fields: 2   # sector/P-E/margins — max fields to be null
  outlier_z_score: 3.0           # flag values > 3σ from historical mean

# ── Publication gate (Associate Reviewer) ──────────────────────────────
publish_gate:
  max_fail_claims: 0             # any failed claim → hard fail
  max_disclosure_claims: 3       # caveat/disclosure claims beyond this → fail
  require_methodology_tag_for_targets: true
  require_date_for_all_numbers: true
  require_traceable_claims: true
  hard_fail_rules:
    - "Any red reconciliation field that lacks an analyst override note"
    - "Any price target without a DCF or comparable methodology tag"
    - "Any data point used in the report that cannot be traced to an ingested source"
    - "Earnings date within 14 days and no event-risk disclosure"
    - "Missing subtheme in any portfolio variant"

# ── Red team thresholds ────────────────────────────────────────────────
red_team:
  required_falsification_tests:
    - ai_efficiency_shock
    - capex_pause_or_delay
    - nuclear_timeline_slip
    - commodity_deflation
    - rising_rates_compression
    - geopolitical_escalation
    - regulatory_crackdown
  min_tests_per_ticker: 3
  fail_threshold: 0.4     # thesis integrity < 0.4 → block publication

# ── Portfolio construction constraints ─────────────────────────────────
portfolio:
  max_single_stock_pct: 15.0
  max_subtheme_pct: 40.0
  min_positions: 8
  max_positions: 15
  require_all_subthemes: true
  cash_range_pct: [0.0, 10.0]    # tactical cash allocation range
  rebalance_trigger_pct: 5.0      # rebalance when drift exceeds this

# ── Confidence scoring ─────────────────────────────────────────────────
confidence:
  tier_1_floor: 0.85
  tier_2_floor: 0.70
  tier_3_floor: 0.55
  tier_4_floor: 0.0
  combined_weight_per_supporting_claim: 0.05
  max_confidence: 0.95            # ceiling to enforce epistemic humility
