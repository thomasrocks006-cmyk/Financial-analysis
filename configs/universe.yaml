# ══════════════════════════════════════════════════════════════════════════════
# Master Research Universe — JPMorgan-Style Institutional Coverage
# ══════════════════════════════════════════════════════════════════════════════
#
# VERSION: v9
# SCOPE:   Multi-asset, multi-region, cross-sector research platform
#
# This file is the MASTER registry of all coverage. Users select focus areas
# via `active_themes` in pipeline.yaml or at the CLI/UI. The pipeline only
# instantiates agents and data ingestion for selected themes.
#
# COVERAGE PHILOSOPHY (mirrors JPAM desk structure):
#   ▸ Global Equities  — sector desks: Tech, Financials, Healthcare, Consumer,
#                        Energy, Industrials, Materials, REITs, Utilities
#   ▸ Fixed Income     — sovereign, IG credit, HY credit, EM debt
#   ▸ Macro & FX       — G10 rates, currency, commodities, central bank watch
#   ▸ Thematic         — AI Infrastructure, Energy Transition, Defense/Security,
#                        Biotech/Genomics, Fintech, Robotics/Automation
#   ▸ Regional Desks   — US large-cap, ASX/Australia, European majors
#
# HOW THEMES MAP TO AGENTS:
#   Each theme key corresponds to a sector_analyst_* agent or generic_sector_analyst.
#   Fixed income themes route to fixed_income_analyst.
#   Macro themes route to macro_regime_strategist + political_risk_analyst.
#   Themes without a named specialist fall to generic_sector_analyst.
# ══════════════════════════════════════════════════════════════════════════════

version: v9

themes:

  # ── THEMATIC ────────────────────────────────────────────────────────────────

  ai_infrastructure:
    label: "AI Infrastructure & Compute"
    analyst: sector_analyst_compute
    asset_class: equities
    region: global
