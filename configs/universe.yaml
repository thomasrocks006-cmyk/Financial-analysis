      Synthesise the competitive landscape, capex spending trends, supply chain risks,
      and regulatory environment for AI compute silicon and infrastructure as of {date}.
      Cover GPU/ASIC dynamics, hyperscaler capex, data-centre power constraints,
      and semiconductor supply chains. Focus on: {tickers}.
    coverage:
      - { ticker: NVDA,  name: "NVIDIA Corporation",                  subtheme: compute,       market_cap_tier: mega,  region: us }
      - { ticker: AVGO,  name: "Broadcom Inc",                        subtheme: compute,       market_cap_tier: mega,  region: us }
