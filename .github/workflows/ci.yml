name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main", "master", "develop"]

permissions:
  contents: read

jobs:
  test:
    name: Lint + Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Install frontend dependencies
        run: |
          npm install --prefix frontend --legacy-peer-deps

      - name: Frontend typecheck
        run: |
          npm --prefix frontend run typecheck

      - name: Frontend production build
        run: |
          npm --prefix frontend run build

      - name: Install Playwright system dependencies
        run: |
          sudo apt-get update -o Dir::Etc::sourceparts='-' -o APT::Get::List-Cleanup='0'
          sudo apt-get install -y \
            libasound2t64 \
            libatk-bridge2.0-0t64 \
            libatk1.0-0t64 \
            libatspi2.0-0t64 \
            libcups2t64 \
            libdrm2 \
            libgbm1 \
            libgtk-3-0t64 \
            libnspr4 \
            libnss3 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxkbcommon0 \
            libxrandr2

      - name: Install Playwright Chromium
        run: |
          npx --prefix frontend playwright install chromium

      - name: Frontend browser smoke tests
        run: |
          npm --prefix frontend run test:e2e

      - name: Run ruff linter
        run: |
          ruff check src/ tests/ --output-format=github

      - name: Run ruff formatter check
        run: |
          ruff format --check src/ tests/

      - name: Run type checks (mypy optional, non-blocking)
        continue-on-error: true
        run: |
          mypy src/research_pipeline --ignore-missing-imports --no-error-summary || true

      - name: Run test suite
        run: |
          python -m pytest tests/ -q --tb=short --strict-markers
        env:
          # Use mock LLM responses in CI — no real API calls
          ANTHROPIC_API_KEY: "ci-test-no-real-key"
          OPENAI_API_KEY: "ci-test-no-real-key"
          GOOGLE_API_KEY: "ci-test-no-real-key"
          FMP_API_KEY: "ci-test-no-real-key"
          FINNHUB_API_KEY: "ci-test-no-real-key"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.python-version }}
          path: |
            .pytest_cache/
            output/audit/
          retention-days: 7

  security-scan:
    name: Security scan (bandit)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install bandit
        run: pip install bandit[toml]
      - name: Run bandit
        run: |
          bandit -r src/ -c pyproject.toml --severity-level medium -q || true
